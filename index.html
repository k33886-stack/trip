<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>跨越星月之國：土耳其經典 13 日公路自駕全紀錄</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #2C699A; --primary-light: #E8F1F5;
            --secondary: #D68C45; --secondary-light: #F7F0E8;
            --bg-color: #F8F9FA; --card-bg: #FFFFFF;
            --text-dark: #2C3E50; --text-light: #7F8C8D;
            --border-color: #EBF0F3; --shadow: 0 10px 25px rgba(180, 190, 200, 0.15);
            --radius: 20px;
        }

        /* [保留您原始的所有 CSS...這裡省略以縮短長度，請確保複製時包含您原始的 CSS] */
        /* 以下為新增/調整的分頁樣式 */
        .ex-tabs { display: flex; background: #F0F4F8; border-radius: 12px; padding: 3px; margin-bottom: 14px; gap: 2px; border: 1px solid #D6E4F0; }
        .ex-tab-btn { flex: 1; padding: 10px 0; font-size: 12px; font-weight: 700; color: #7F8C8D; border: none; background: none; cursor: pointer; border-radius: 9px; transition: 0.2s; }
        .ex-tab-btn.active { background: var(--secondary); color: #FFF; }
        .ex-content { display: none; }
        .ex-content.active { display: block; }
    </style>
</head>
<body>
    <div class="overview-card">
        <div class="overview-title">🪙 景點周邊換匯導航</div>
        <div class="ex-tabs">
            <button class="ex-tab-btn active" onclick="switchEx(this, 'ex-ist')">伊斯坦堡</button>
            <button class="ex-tab-btn" onclick="switchEx(this, 'ex-road')">自駕沿途</button>
            <button class="ex-tab-btn" onclick="switchEx(this, 'ex-cap')">卡帕</button>
            <button class="ex-tab-btn" onclick="switchEx(this, 'ex-coast')">海邊</button>
        </div>

        <div id="ex-ist" class="ex-content active">
            <ul><li>Haznedar Döviz (大巴扎旁) <a href="#" class="inline-maps-btn">🗺️</a></li></ul>
        </div>
        <div id="ex-road" class="ex-content">
            <ul><li>Safranbolu Döviz (新城區) <a href="#" class="inline-maps-btn">🗺️</a></li></ul>
        </div>
        <div id="ex-cap" class="ex-content">
            <ul><li>Göreme Döviz (歌樂美) <a href="#" class="inline-maps-btn">🗺️</a></li></ul>
        </div>
        <div id="ex-coast" class="ex-content">
            <ul><li>Antalya Döviz (老城入口) <a href="#" class="inline-maps-btn">🗺️</a></li></ul>
        </div>
    </div>

    <script>
        // 換匯分頁切換邏輯
        function switchEx(btn, id) {
            const parent = btn.closest('.overview-card');
            parent.querySelectorAll('.ex-tab-btn').forEach(b => b.classList.remove('active'));
            parent.querySelectorAll('.ex-content').forEach(c => c.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById(id).classList.add('active');
        }
        // [保留您原始的 switchTab, renderLedger 等所有 JS 邏輯...]
    </script>
</body>
</html>
