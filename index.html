<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>跨越星月之國：土耳其經典 13 日公路自駕全紀錄</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2C699A; --secondary: #D68C45; --bg-color: #F8F9FA; --card-bg: #FFFFFF; --text-dark: #2C3E50; --border-color: #EBF0F3; --shadow: 0 10px 25px rgba(180, 190, 200, 0.15); --radius: 20px; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Noto Sans TC', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-dark); padding-bottom: 40px; }
        .hero-banner { background: linear-gradient(135deg, #E8F1F5 0%, #F7F0E8 100%); padding: 40px 20px 30px 20px; text-align: center; border-bottom: 1px solid var(--border-color); }
        .container { max-width: 600px; margin: 0 auto; padding: 16px; }
        .overview-card { background: var(--card-bg); border-radius: var(--radius); padding: 24px; margin-bottom: 20px; box-shadow: var(--shadow); border: 1px solid var(--border-color); }
        .overview-title { font-size: 16px; font-weight: 700; color: var(--primary); margin-bottom: 16px; }
        
        /* 頁籤通用樣式 */
        .nav-tabs { display: flex; background-color: #EAEFF4; border-radius: 14px; padding: 4px; margin-bottom: 20px; gap: 2px; }
        .tab-btn { flex: 1; text-align: center; padding: 12px 0; font-size: 12px; font-weight: 500; color: #566573; border: none; background: none; cursor: pointer; border-radius: 10px; transition: 0.2s; }
        .tab-btn.active { background-color: var(--card-bg); color: var(--primary); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        /* 換匯樣式 */
        .ex-item-card { background: #FFF9E6; border: 1px solid #FFE0B2; padding: 12px; border-radius: 10px; margin-bottom: 8px; font-size: 13px; color: #5D6D7E; }
        .inline-maps-btn { color: var(--primary); border: 1px solid var(--primary); padding: 1px 6px; border-radius: 4px; text-decoration: none; font-size: 11px; float: right; background: #FFF; }
        
        /* 其他行程摺疊樣式請保留您原本的 .day-accordion 等 CSS */
        .day-accordion { background: white; border-radius: 20px; margin-bottom: 14px; box-shadow: var(--shadow); border: 1px solid #EBF0F3; }
        .day-header { padding: 18px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .day-content { display: none; padding: 18px; border-top: 1px solid #EBF0F3; }
        .day-accordion.open .day-content { display: block; }
    </style>
</head>
<body>
    <div class="hero-banner"><h1>跨越星月之國</h1><p>土耳其經典 13 日自駕全紀錄</p></div>

    <div class="container">
        <div class="overview-card">
            <div class="overview-title">🪙 景點周邊特選換匯所</div>
            <div class="nav-tabs" style="background: #F2F4F7;">
                <button class="tab-btn active" onclick="switchEx(this, 'ex-ist')">✈️ 機場/伊城</button>
                <button class="tab-btn" onclick="switchEx(this, 'ex-road')">🏰 自駕沿途</button>
                <button class="tab-btn" onclick="switchEx(this, 'ex-cap')">🎈 卡帕/海濱</button>
            </div>
            
            <div id="ex-ist" class="tab-content active">
                <div class="ex-item-card">Global Exchange (IST機場) <a href="#" class="inline-maps-btn">🗺️</a></div>
                <div class="ex-item-card">Haznedar Döviz (大巴扎旁) <a href="#" class="inline-maps-btn">🗺️</a></div>
            </div>
            <div id="ex-road" class="tab-content">
                <div class="ex-item-card">Safranbolu Döviz (番紅花城) <a href="#" class="inline-maps-btn">🗺️</a></div>
            </div>
            <div id="ex-cap" class="tab-content">
                <div class="ex-item-card">Göreme Döviz (卡帕多奇亞) <a href="#" class="inline-maps-btn">🗺️</a></div>
                <div class="ex-item-card">Antalya/Fethiye 海濱換匯 <a href="#" class="inline-maps-btn">🗺️</a></div>
            </div>
        </div>

        <div class="nav-tabs">
            <button class="tab-btn active" onclick="switchTab(this, 'itinerary-tab')">📅 詳細行程</button>
            <button class="tab-btn" onclick="switchTab(this, 'ledger-tab')">💰 隨身記帳</button>
        </div>

        <div id="itinerary-tab" class="tab-content active">
            <div class="day-accordion">
                <div class="day-header" onclick="this.parentElement.classList.toggle('open')">Day 1：啟程抵達... ▼</div>
                <div class="day-content">您的完整行程資料...</div>
            </div>
        </div>

        <div id="ledger-tab" class="tab-content">
            </div>
    </div>

    <script>
        // 通用頁籤切換邏輯
        function switchTab(btn, id) {
            btn.parentElement.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById(id).classList.add('active');
        }
        
        function switchEx(btn, id) {
            btn.parentElement.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.parentElement.parentElement.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById(id).classList.add('active');
        }
    </script>
</body>
</html>
