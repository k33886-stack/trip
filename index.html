<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>跨越星月之國：土耳其經典 13 日公路自駕全紀錄</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2C699A; --card-bg: #FFFFFF; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Noto Sans TC', sans-serif; }
        body { background-color: #F8F9FA; padding-bottom: 40px; }
        .container { max-width: 600px; margin: 0 auto; padding: 16px; }
        .overview-card { background: var(--card-bg); border-radius: 20px; padding: 24px; margin-bottom: 20px; border: 1px solid #EBF0F3; box-shadow: 0 10px 25px rgba(180, 190, 200, 0.15); }
        
        /* 頁籤通用樣式 */
        .nav-tabs { display: flex; background-color: #EAEFF4; border-radius: 14px; padding: 4px; gap: 2px; }
        .tab-btn { flex: 1; padding: 12px 0; font-size: 12px; font-weight: 500; color: #566573; border: none; background: none; cursor: pointer; border-radius: 10px; }
        .tab-btn.active { background-color: var(--card-bg); color: var(--primary); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        
        /* 內容隱藏邏輯：預設隱藏，僅 active 顯示 */
        .tab-content { display: none; }
        .tab-content.active { display: block !important; }
        
        .exchange-inner-content { padding: 15px 0; font-size: 13px; color: #5D6D7E; }
        .inline-maps-btn { display: inline-flex; color: var(--primary); border: 1px solid var(--primary); padding: 1px 5px; border-radius: 4px; margin-left: 6px; text-decoration: none; font-size: 11px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="overview-card">
            <div style="font-weight:700; color:var(--primary); margin-bottom:16px;">🪙 景點周邊特選換匯所</div>
            <div class="nav-tabs" style="background: #FFF9E6; border: 1px solid #FFE0B2;">
                <button class="tab-btn active" onclick="switchTabGroup(this, 'ex-ist')">✈️ 機場</button>
                <button class="tab-btn" onclick="switchTabGroup(this, 'ex-baz')">🕌 大巴扎</button>
                <button class="tab-btn" onclick="switchTabGroup(this, 'ex-oth')">🏰 其他</button>
            </div>
            <div id="ex-ist" class="tab-content active">
                <div class="exchange-inner-content">
                    <ul><li><strong>Global Exchange (IST 機場店)</strong> <a href="#" class="inline-maps-btn">🗺️ 導航</a></li></ul>
                    <p style="font-size:11px; color:#E74C3C; margin-top:4px;">⚠️ 注意：匯率極差，僅換 20-50 歐元支付過路費即可。</p>
                </div>
            </div>
            <div id="ex-baz" class="tab-content">
                <div class="exchange-inner-content">
                    <ul>
                        <li><strong>Haznedar Döviz</strong> <a href="#" class="inline-maps-btn">🗺️ 導航</a></li>
                        <li><strong>Nuruosmaniye Döviz</strong> <a href="#" class="inline-maps-btn">🗺️ 導航</a></li>
                    </ul>
                </div>
            </div>
            <div id="ex-oth" class="tab-content">
                <div class="exchange-inner-content">
                    <ul>
                        <li><strong>番紅花城：Safranbolu Döviz</strong> <a href="#" class="inline-maps-btn">🗺️ 導航</a></li>
                        <li><strong>卡帕：Göreme Döviz</strong> <a href="#" class="inline-maps-btn">🗺️ 導航</a></li>
                    </ul>
                </div>
            </div>
        </div>
    </div>

    <script>
        function switchTabGroup(btn, id) {
            // 找到按鈕所在的父容器，確保只影響當前組別
            const container = btn.closest('.overview-card');
            
            // 移除同組所有按鈕的 active
            container.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            // 移除同組所有內容的 active
            container.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            
            // 啟用點擊項目
            btn.classList.add('active');
            document.getElementById(id).classList.add('active');
        }
    </script>
</body>
</html>
