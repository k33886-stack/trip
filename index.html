<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>跨越星月之國：土耳其經典 13 日公路自駕全紀錄</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght=300;400;500;700&display=swap" rel="stylesheet">
    
    <style>
        /* ... (保留你原有的 :root 與所有 CSS 設定，這裡省略以節省篇幅) ... */
        /* 請務必保留你原本完整的 CSS，下方是我優化後的換匯區塊 CSS */
        
        .exchange-tabs-nav { display: flex; gap: 4px; margin-bottom: 15px; overflow-x: auto; }
        .ex-btn { flex: 1; padding: 8px 5px; font-size: 11px; border: 1px solid #D6E4F0; background: #F8F9FA; border-radius: 8px; cursor: pointer; }
        .ex-btn.active { background: var(--secondary); color: white; border-color: var(--secondary); }
        .ex-content-item { display: none; }
        .ex-content-item.active { display: block; }
    </style>
</head>
<body>
    <div class="overview-card">
        <div class="overview-title">🪙 景點周邊換匯導航</div>
        
        <div class="exchange-tabs-nav">
            <button class="ex-btn active" onclick="switchEx(this, 'ex1')">✈️ 機場</button>
            <button class="ex-btn" onclick="switchEx(this, 'ex2')">🕌 大巴扎</button>
            <button class="ex-btn" onclick="switchEx(this, 'ex3')">🏰 番紅花</button>
            <button class="ex-btn" onclick="switchEx(this, 'ex4')">🎈 卡帕</button>
            <button class="ex-btn" onclick="switchEx(this, 'ex5')">🌊 三海</button>
        </div>

        <div id="ex1" class="ex-content-item active">
            <ul><li>Global Exchange (IST 機場店) <a href="https://maps.google.com?q=Global+Exchange+Istanbul+Airport" target="_blank" class="inline-maps-btn">🗺️</a></li></ul>
        </div>
        <div id="ex2" class="ex-content-item">
            <ul>
                <li>Haznedar Döviz (大巴扎旁) <a href="https://maps.google.com?q=Haznedar+Doviz+Grand+Bazaar" target="_blank" class="inline-maps-btn">🗺️</a></li>
                <li>Nuruosmaniye Döviz <a href="https://maps.google.com?q=Nuruosmaniye+Doviz+Istanbul" target="_blank" class="inline-maps-btn">🗺️</a></li>
            </ul>
        </div>
        </div>

    <script>
        // 這是切換換匯分頁的邏輯
        function switchEx(btn, id) {
            document.querySelectorAll('.ex-content-item').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.ex-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
        }
        
        // (請確保你原本的 switchTab, addLedgerItem, fetchLiveWeather 等所有 JS 函數都在這裡)
    </script>
</body>
</html>
