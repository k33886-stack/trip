<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>跨越星月之國：土耳其經典 13 日公路自駕全紀錄</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #2C699A; 
            --primary-light: #E8F1F5;
            --secondary: #D68C45; 
            --secondary-light: #F7F0E8;
            --bg-color: #F8F9FA; 
            --card-bg: #FFFFFF;
            --text-dark: #2C3E50;
            --text-light: #7F8C8D;
            --border-color: #EBF0F3;
            --shadow: 0 10px 25px rgba(180, 190, 200, 0.15);
            --radius: 20px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Noto Sans TC', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-dark);
            line-height: 1.6;
            padding-bottom: 40px;
        }

        /* 頂部橫幅 */
        .hero-banner {
            background: linear-gradient(135deg, #E8F1F5 0%, #F7F0E8 100%);
            padding: 40px 20px 30px 20px;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
        }

        .hero-banner h1 {
            font-size: 22px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .hero-banner p {
            font-size: 13px;
            color: var(--text-light);
            font-weight: 300;
        }

        /* 主容器 */
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 16px;
        }

        /* 行程總覽卡片 */
        .overview-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
        }

        .overview-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .overview-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            font-size: 13px;
        }

        .overview-item {
            background-color: var(--bg-color);
            padding: 12px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }

        .overview-item span {
            display: block;
            color: var(--text-light);
            font-size: 11px;
            margin-bottom: 4px;
        }

        .overview-item strong {
            color: var(--text-dark);
            font-weight: 500;
        }

        /* 功能分頁導覽 */
        .nav-tabs {
            display: flex;
            background-color: #EAEFF4;
            border-radius: 14px;
            padding: 4px;
            margin-bottom: 20px;
        }

        .tab-btn {
            flex: 1;
            text-align: center;
            padding: 12px 0;
            font-size: 13px;
            font-weight: 500;
            color: #566573;
            border: none;
            background: none;
            cursor: pointer;
            border-radius: 10px;
            transition: all 0.2s;
        }

        .tab-btn.active {
            background-color: var(--card-bg);
            color: var(--primary);
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* 行程摺疊卡片 */
        .day-accordion {
            background: var(--card-bg);
            border-radius: var(--radius);
            margin-bottom: 14px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
            overflow: hidden;
        }

        .day-header {
            padding: 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }

        .day-title-box {
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .day-number {
            font-size: 11px;
            color: var(--secondary);
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .day-title {
            font-size: 15px;
            font-weight: 700;
            color: var(--text-dark);
            margin-top: 4px;
        }

        .arrow-icon {
            font-size: 12px;
            color: var(--text-light);
            transition: transform 0.3s;
            margin-left: 10px;
        }

        .day-accordion.open .arrow-icon {
            transform: rotate(180deg);
        }

        .day-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
            background-color: #FAFCFD;
        }

        .day-accordion.open .day-content {
            max-height: 4500px;
            border-top: 1px solid var(--border-color);
        }

        .day-inner-padding {
            padding: 18px;
        }

        /* 住宿與地圖區塊 */
        .hotel-info-box {
            background-color: #F8FAFC;
            border: 1px solid #E2E8F0;
            padding: 14px;
            border-radius: 12px;
            margin-bottom: 16px;
            font-size: 13px;
        }

        .hotel-name {
            font-weight: 700;
            color: var(--text-dark);
        }

        .maps-btn {
            display: inline-flex;
            align-items: center;
            background-color: var(--card-bg);
            color: var(--primary);
            border: 1px solid var(--primary);
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 500;
            text-decoration: none;
            margin-top: 6px;
            margin-right: 6px;
            transition: all 0.2s;
        }

        .maps-btn:hover {
            background-color: var(--primary-light);
        }

        .inline-maps-btn {
            display: inline-flex;
            color: var(--primary);
            text-decoration: none;
            font-size: 11px;
            border: 1px solid var(--primary);
            padding: 1px 5px;
            border-radius: 4px;
            margin-left: 6px;
            vertical-align: middle;
            background: #FFF;
        }

        /* 時間軸 */
        .timeline {
            position: relative;
            padding-left: 20px;
        }

        .timeline::before {
            content: '';
            position: absolute;
            left: 3px;
            top: 6px;
            bottom: 6px;
            width: 2px;
            background-color: #E2E8F0;
        }

        .timeline-item {
            position: relative;
            padding-bottom: 14px;
        }

        .timeline-item:last-child {
            padding-bottom: 0;
        }

        .timeline-dot {
            position: absolute;
            left: -21px;
            top: 6px;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: var(--primary);
            border: 2px solid var(--card-bg);
            box-shadow: 0 0 0 2px var(--primary-light);
